services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wheeldesk
      POSTGRES_USER: wheeldesk
      POSTGRES_PASSWORD: wheeldesk
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
  web:
    build: .
    environment:
      DATABASE_URL: postgresql://wheeldesk:wheeldesk@postgres:5432/wheeldesk?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: local-dev-secret-change-me
      DATA_PROVIDER: mock
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
volumes:
  postgres-data:
  redis-data:
